<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheatsheets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: #fafafa;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 48px 32px 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.2px;
    }

    main {
      flex: 1;
      padding: 56px 32px;
      max-width: 640px;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .sheet-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sheet {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.1s;
    }

    .sheet:hover {
      background: #f3f4f6;
    }

    .sheet-name {
      font-size: 1rem;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
    }

    .sheet-desc {
      font-size: 0.88rem;
      color: #9ca3af;
    }

    footer {
      padding: 24px 32px;
      font-size: 0.75rem;
      color: #d1d5db;
    }
  </style>
</head>
<body>

  <header>
    <h1>Cheatsheets</h1>
    <p style="margin-top:6px;font-size:0.85rem;color:#9ca3af;">Notes I made for my own interview prep.</p>
  </header>

  <main>
    <div class="label">All sheets</div>
    <div class="sheet-list">

      <a class="sheet" href="dsa-faang-cheatsheet.html">
        <span class="sheet-name">DSA Cheat Sheet</span>
        <span class="sheet-desc">Revise your DSA here</span>
      </a>

    </div>
  </main>

  <footer>
    Personal prep notes &nbsp;·&nbsp;
    <a href="https://github.com/bythebug" target="_blank" style="color:#9ca3af;text-decoration:none;">github.com/bythebug</a>
  </footer>

</body>
</html>
